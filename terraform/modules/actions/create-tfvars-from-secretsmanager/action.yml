---
name: 'Retrieve and Create .tfvars'
description: |
  Retrieve TF Vars from AWS Secrets Manager and save them to the designated
  file path.
inputs:
  secret-name:
    description: "Name of Secret stored in AWS Secrets Manager"
    required: true
  tf-vars-file-path:
    description: "Complete path to desired .tfvars file"
    required: true
  aws-region:
    description: "aws region"
    required: false
  role-of-usecase:
    description: "Use the provided credentials to assume an IAM role and configure the Actions environment with the assumed role credentials rather than\
      \ with the provided credentials"
    default: ''
    required: false
  role-to-assume:
    description: "Use the provided credentials to assume an IAM role and configure the Actions environment with the assumed role credentials rather than\
      \ with the provided credentials"
    default: ''
    required: false
runs:
  using: "composite"
  steps:
  - name: Authenticate with OIDC role
    if: inputs.role-to-assume != ''
    uses: aws-actions/configure-aws-credentials@v6
    with:
      aws-region: ${{ inputs.aws-region }}
      role-to-assume: ${{ inputs.role-to-assume }}
      role-session-name: ${{ github.event.repository.name }}
      mask-aws-account-id: false
  - name: Configure use-case AWS Credentials
    if: inputs.role-of-usecase != ''
    uses: aws-actions/configure-aws-credentials@v6
    with:
      aws-region: ${{ inputs.aws-region }}
      role-to-assume: ${{ inputs.role-of-usecase }}
      role-session-name: ${{ github.event.repository.name }}
      role-chaining: true
      role-skip-session-tagging: true
  - name: "Create .tfvars from AWS Secrets Manager"
    shell: bash
    run: |
      aws secretsmanager get-secret-value \
        --secret-id "${{ inputs.secret-name }}" \
        | jq -r '.SecretString' \
        > ${{ inputs.tf-vars-file-path }}
