---
## This action is used to assume an AWS Role using "assume-role-with-web-identity".
## When triggering multiple calls of the "aws sts assume-role-with-web-identity" at the same time
## (multiple plans running in parallel), there is a high probability to receive an error (InvalidIdentityToken -
## error code 254). So, we used a retry mechanism for this call, which is implemented in "err_retry" bash function.
## The credentials retrieved this way are then saves in ~/.aws/credentials file
##
## We also did multiple tests with actions/configure-aws-credentials, as suggested by GitHub, but this action does
## not work well when multiple roles need to be assumed in the same pipeline.

name: 'AssumeAWSRoleWithRetry'
description: 'Assume AWS Role and Save the Credentials in AWS Profile'
inputs:
  aws-region:
    description: ''
    required: true
  use-role-arn:
    description: ''
    required: true
  session-name:
    required: false
    description: ''
    default: GitHubActions
  profile-name:
    description: ''
    required: true

runs:
  using: 'composite'
  steps:
  - name: Install OIDC Client from Core Package
    shell: bash
    run: npm install @actions/core@1.10.0 @actions/http-client
  - name: Get Id Token
    uses: actions/github-script@v8.0.0
    id: idtoken
    with:
      script: |
        const coredemo = require('@actions/core')
        let id_token = await coredemo.getIDToken('sts.amazonaws.com')
        coredemo.setOutput('id_token', id_token)
  - name: Configure AWS Credentials
    id: configure-aws-credentials
    shell: bash
    run: |
      function err_retry() {
        local exit_code=$1
        local attempts=$2
        local sleep_millis=$3
        shift 3
        for attempt in `seq 1 $attempts`; do
          # This weird construction lets us capture return codes under -o errexit
          "$@" && local rc=$? || local rc=$?
          if [[ ! $rc -eq $exit_code ]]; then
            return $rc
          fi
          if [[ $attempt -eq $attempts ]]; then
            return $rc
          fi
          local sleep_ms="$(($attempt * $attempt * $sleep_millis))"
          sleep "${sleep_ms:0:-3}.${sleep_ms: -3}"
        done
      }

      (err_retry 254 5 1000 aws sts assume-role-with-web-identity \
      --role-arn ${{ inputs.use-role-arn }} \
      --role-session-name ${{ inputs.session-name }} \
      --web-identity-token ${{ steps.idtoken.outputs.id_token }} \
      --duration-seconds 3600 \
      --region eu-west-1 ) > ./${{ inputs.profile-name }}.json

  - name: Ensure credentials file exists
    shell: bash
    run: mkdir -p ~/.aws
  - name: Save Credentials to file
    shell: bash
    run: |
      echo "[${{inputs.profile-name}}]" >> ~/.aws/credentials
      ACCESS_KEY_ID="$(cat ${{ inputs.profile-name }}.json| jq -r ".Credentials.AccessKeyId")"

      echo "aws_access_key_id = $ACCESS_KEY_ID">> ~/.aws/credentials
      SECRET_ACCESS_KEY="$(cat ${{ inputs.profile-name }}.json| jq -r ".Credentials.SecretAccessKey")"

      echo "aws_secret_access_key = $SECRET_ACCESS_KEY" >> ~/.aws/credentials
      SESSION_TOKEN="$(cat ${{ inputs.profile-name }}.json| jq -r ".Credentials.SessionToken")"
      echo "aws_session_token = $SESSION_TOKEN" >> ~/.aws/credentials

      unset ACCESS_KEY_ID
      unset SECRET_ACCESS_KEY
      unset SESSION_TOKEN
